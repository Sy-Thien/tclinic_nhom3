<!DOCTYPE html>
<html>

<head>
    <title>Check User</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 2rem;
            background: #f5f5f5;
        }

        .info {
            background: white;
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: 0 auto;
        }

        pre {
            background: #f0f0f0;
            padding: 1rem;
            border-radius: 4px;
            overflow-x: auto;
        }

        button {
            padding: 0.75rem 1.5rem;
            background: #45c3d2;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin: 0.5rem;
        }

        button:hover {
            background: #2aa6b7;
        }
    </style>
</head>

<body>
    <div class="info">
        <h2>🔍 User Info Check</h2>
        <div id="result"></div>
        <button onclick="clearStorage()">Clear Storage & Reload</button>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const user = localStorage.getItem('user');

        let html = '<h3>Token:</h3>';
        html += token ? `<pre>${token.substring(0, 50)}...</pre>` : '<p>No token</p>';

        html += '<h3>User Data:</h3>';
        if (user) {
            try {
                const userData = JSON.parse(user);
                html += '<pre>' + JSON.stringify(userData, null, 2) + '</pre>';
            } catch (e) {
                html += '<p style="color: red;">Invalid JSON: ' + user + '</p>';
            }
        } else {
            html += '<p>No user data</p>';
        }

        document.getElementById('result').innerHTML = html;

        function clearStorage() {
            localStorage.clear();
            alert('Storage cleared!');
            window.location.reload();
        }
    </script>
</body>

</html>
