# ============================================================
# Cấu hình Nginx cho React SPA + Reverse Proxy tới Backend
# ============================================================

server {
    # Lắng nghe port 80
    listen 80;
    server_name localhost;

    # Thư mục chứa file build React
    root /usr/share/nginx/html;
    index index.html;

    # ============================================================
    # REVERSE PROXY: Chuyển tiếp /api → Backend container
    # ============================================================
    # Khi client gọi /api/..., Nginx sẽ proxy request tới server backend
    # "server" là tên service trong docker-compose.yml
    location /api/ {
        proxy_pass http://server:5000;
        proxy_http_version 1.1;

        # Hỗ trợ WebSocket (cho Socket.io)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Truyền thông tin gốc của request
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================================
    # PROXY cho Socket.io
    # ============================================================
    location /socket.io/ {
        proxy_pass http://server:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ============================================================
    # REACT SPA: Mọi route khác → trả về index.html
    # ============================================================
    # React Router xử lý routing phía client
    # Nếu không có rule này, F5 trang /doctor/schedule sẽ bị lỗi 404
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ============================================================
    # CACHE: Tối ưu tốc độ tải trang
    # ============================================================
    # Cache file tĩnh (JS, CSS, hình ảnh) trong 1 năm
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
