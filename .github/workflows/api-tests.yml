# GitHub Actions workflow để chạy API tests tự động
# Mỗi khi push code hoặc tạo Pull Request → test sẽ tự động chạy

name: 🧪 API Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  # Cho phép chạy thủ công từ tab Actions
  workflow_dispatch:

jobs:
  api-tests:
    name: Run Postman API Tests
    runs-on: ubuntu-latest
    
    # Dùng MySQL service container
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: tn_clinic
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      # 1. Checkout code
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 3. Install server dependencies
      - name: 📦 Install server dependencies
        working-directory: ./server
        run: npm install

      # 4. Wait for MySQL to be ready
      - name: ⏳ Wait for MySQL
        run: |
          until mysqladmin ping -h"127.0.0.1" -uroot -proot --silent; do
            echo "Waiting for MySQL..."
            sleep 3
          done
          echo "MySQL is ready!"

      # 5. Setup database schema - use sync instead of migrations for CI
      - name: 🗄️ Setup database
        working-directory: ./server
        env:
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: tn_clinic
        run: |
          # Create a script to sync database
          cat > sync-db.js << 'EOF'
          const { sequelize } = require('./models');
          
          async function syncDB() {
            try {
              await sequelize.sync({ force: true });
              console.log('✅ Database synced successfully');
              process.exit(0);
            } catch (err) {
              console.error('❌ Database sync failed:', err.message);
              process.exit(1);
            }
          }
          
          syncDB();
          EOF
          
          node sync-db.js

      # 6. Seed test data (admin account, etc.)
      - name: 🌱 Seed test data
        working-directory: ./server
        env:
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: tn_clinic
        run: |
          # Create seed script
          cat > seed-test-data.js << 'EOF'
          const bcrypt = require('bcrypt');
          const { sequelize, Admin, Specialty, Doctor, Service, Room } = require('./models');
          
          async function seedData() {
            try {
              // Create admin
              const hashedPassword = await bcrypt.hash('admin123', 10);
              await Admin.create({
                username: 'admin',
                password: hashedPassword,
                email: 'admin@tclinic.com',
                full_name: 'Administrator'
              }).catch(() => console.log('Admin exists'));
              
              // Create specialty
              await Specialty.create({
                id: 1,
                name: 'Khoa Nội',
                description: 'Khám và điều trị bệnh nội khoa'
              }).catch(() => console.log('Specialty exists'));
              
              // Create room
              await Room.create({
                id: 1,
                name: 'Phòng 101',
                floor: 1,
                description: 'Phòng khám tổng quát'
              }).catch(() => console.log('Room exists'));
              
              // Create doctor
              const doctorPassword = await bcrypt.hash('doctor123', 10);
              await Doctor.create({
                id: 1,
                full_name: 'Bác sĩ Test',
                email: 'doctor1@tclinic.com',
                password: doctorPassword,
                phone: '0901234567',
                specialty_id: 1
              }).catch(() => console.log('Doctor exists'));
              
              // Create service
              await Service.create({
                id: 1,
                name: 'Khám tổng quát',
                description: 'Dịch vụ khám tổng quát',
                price: 100000,
                specialty_id: 1
              }).catch(() => console.log('Service exists'));
              
              console.log('✅ Test data seeded successfully');
              process.exit(0);
            } catch (err) {
              console.error('❌ Seeding failed:', err.message);
              process.exit(0); // Don't fail the workflow
            }
          }
          
          seedData();
          EOF
          
          node seed-test-data.js

      # 7. Start server in background
      - name: 🚀 Start server
        working-directory: ./server
        env:
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: tn_clinic
          DB_DIALECT: mysql
          JWT_SECRET: test-secret-key-for-ci
          PORT: 5000
          NODE_ENV: ci
          SKIP_REMINDER: "true"
        run: |
          # Create .env file for server
          echo "DB_HOST=127.0.0.1" > .env
          echo "DB_USER=root" >> .env
          echo "DB_PASSWORD=root" >> .env
          echo "DB_NAME=tn_clinic" >> .env
          echo "DB_DIALECT=mysql" >> .env
          echo "JWT_SECRET=test-secret-key-for-ci" >> .env
          echo "PORT=5000" >> .env
          echo "NODE_ENV=ci" >> .env
          echo "SKIP_REMINDER=true" >> .env
          
          # Start server
          node server.js &
          echo "Waiting for server to start..."
          sleep 15

      # 8. Check server health
      - name: ❤️ Health check
        run: |
          echo "Checking server health..."
          for i in 1 2 3 4 5 6; do
            echo "Attempt $i..."
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health | grep -q "200"; then
              echo "✅ Server is healthy!"
              curl -s http://localhost:5000/health
              exit 0
            fi
            echo "Server not ready yet, waiting..."
            sleep 5
          done
          echo "❌ Server health check failed after 6 attempts"
          # Show server logs if possible
          ps aux | grep node || true
          exit 1

      # 9. Install Newman (Postman CLI)
      - name: 📦 Install Newman
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra

      # 10. Create test results directory
      - name: 📁 Create results directory
        run: mkdir -p test-results

      # 11. Run API tests
      - name: 🧪 Run API Tests
        continue-on-error: true
        run: |
          newman run postman/TClinic_API_Collection.postman_collection.json \
            -e postman/TClinic_Environment.postman_environment.json \
            --reporters cli,htmlextra,json \
            --reporter-htmlextra-export ./test-results/report.html \
            --reporter-json-export ./test-results/results.json \
            --delay-request 100 \
            --timeout-request 10000

      # 12. Upload test results
      - name: 📊 Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results
          path: test-results/
          retention-days: 30

      # 13. Display test summary
      - name: 📋 Test Summary
        if: always()
        run: |
          if [ -f "./test-results/results.json" ]; then
            echo "=== TEST RESULTS ==="
            cat ./test-results/results.json | jq '.run.stats' || cat ./test-results/results.json
          else
            echo "No test results found"
          fi